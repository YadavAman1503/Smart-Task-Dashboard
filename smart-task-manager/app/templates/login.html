<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <style>

        body{
            background:#081028;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            width:400px;
            background:#1a233a;
            padding:30px;
            border-radius:15px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            border-radius:8px;
            background:#00c6ff;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        a{
            color:#00c6ff;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>🔐 Login</h1>

    <input type="email" id="loginEmail" placeholder="Email">

    <input type="password" id="loginPassword" placeholder="Password">

    <button onclick="loginUser()">Login</button>

    <p>
        Don't have account?
        <a href="/register">Register</a>
    </p>

</div>

<script>

async function loginUser(){

    const email = document.getElementById("loginEmail").value

    const password = document.getElementById("loginPassword").value

    const response = await fetch("/api/login",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            email,
            password
        })
    })

    const data = await response.json()

    alert(data.message)

    if(data.success){

        window.location.href="/dashboard"
    }
}

</script>

</body>
</html>
